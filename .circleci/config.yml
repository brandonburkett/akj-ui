# Used as base example: https://github.com/CircleCI-Public/circleci-demo-javascript-express/blob/master/.circleci/config.yml
version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:24.18.0-browsers
    steps:
      - checkout
      # Install AWS CLI v2 (official installer; the node image doesn't ship aws)
      - run:
          name: Install AWS CLI v2
          command: |
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip -q awscliv2.zip
            sudo ./aws/install --update
            aws --version
      # cache node_modules keyed on the lock file
      - restore_cache:
          key: npm-cache-{{ checksum "package-lock.json" }}
      - run:
          name: Install node modules
          command: npm ci
      - save_cache:
          key: npm-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
      # type check (astro check)
      - run:
          name: Type check
          command: npm run check
      # Playwright browser needed for e2e tests
      - run:
          name: Install Playwright browser
          command: npx playwright install --with-deps chromium
      # unit (Vitest) + e2e (Playwright) tests
      - run:
          name: Run tests
          command: npm test
      # static build (extensionless html via build.format:'file')
      - run:
          name: Build
          command: npm run build
      - run:
          name: Deploy to S3 + CloudFront invalidation
          command: |
            if [ "${CIRCLE_BRANCH}" == "master" ]; then
              echo "Deploying to production"
              ./.circleci/production.sh
            elif [[ ${CIRCLE_BRANCH} =~ int\/.* ]]; then
              echo "No deployment for staging"
              # ./.circleci/staging.sh
            elif [[ ${CIRCLE_BRANCH} =~ hot\/.* ]]; then
              echo "No deployment for hot fixes"
              # ./.circleci/staging.sh
            fi
workflows:
  build:
    jobs:
      - build:
          filters:
            branches:
              only:
                - master
